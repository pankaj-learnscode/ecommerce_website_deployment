services:
  backend:
    build:
      context: ../Backend
    container_name: backend
    ports:
      - "5001:5000"
    env_file:
      - ../Backend/.env

  frontend:
    build:
      context: ../Frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus